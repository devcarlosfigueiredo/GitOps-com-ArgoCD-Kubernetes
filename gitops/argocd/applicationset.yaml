# =============================================================================
# ApplicationSet — gitops/argocd/applicationset.yaml
#
# Gera Applications para dev e prod a partir de um único YAML.
# Adicionar um novo ambiente = adicionar uma entrada em 'elements'.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: myapp-environments
  namespace: argocd
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/managed-by: argocd
spec:
  generators:
    - list:
        elements:
          - environment: dev
            namespace: myapp-dev
            branch: develop
            syncWave: "1"

          - environment: prod
            namespace: myapp-prod
            branch: main
            syncWave: "2"

  template:
    metadata:
      name: "myapp-{{environment}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: myapp
        environment: "{{environment}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
        notifications.argoproj.io/subscribe.on-sync-failed.slack: alerts
        notifications.argoproj.io/subscribe.on-health-degraded.slack: alerts
      finalizers:
        - resources-finalizer.argocd.argoproj.io

    spec:
      project: gitops-demo

      source:
        repoURL: https://github.com/YOUR_ORG/gitops-argocd-demo
        targetRevision: "{{branch}}"
        path: "gitops/apps/myapp/overlays/{{environment}}"

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - ServerSideApply=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
        - group: autoscaling
          kind: HorizontalPodAutoscaler
          jsonPointers:
            - /spec/replicas

      revisionHistoryLimit: 10
