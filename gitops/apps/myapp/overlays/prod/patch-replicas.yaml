# =============================================================================
# Prod Patch — 3 réplicas para alta disponibilidade
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  # Prod: mínimo 3 réplicas distribuídas por zonas de disponibilidade
  replicas: 3
  template:
    spec:
      # Anti-affinity: garante que réplicas ficam em nós diferentes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - myapp
                topologyKey: kubernetes.io/hostname
