# =============================================================================
# PodDisruptionBudget — garante disponibilidade durante manutenção do cluster
# Mínimo de 2 réplicas sempre disponíveis em prod (de 3 totais)
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: myapp-pdb
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/managed-by: argocd
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: myapp
